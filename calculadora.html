</head>
<body>

        <div class="menu-container">
            <a href="index.html" class="menu-logo"> Trote 2026</a>

    <main class="principal">
        <section class="calculadora">
            <h3> Simulador de Pontuação</h3>
            <div class="fgrid">
                <label for=" "> Arroz(5kg) - 10pts</label>
                <input type="number" id="qtarroz" min="0">
            </div>
            <div class="fgrid">
                <label for=" "> Feijão(2kg) - 8pts</label>
                <input type="number" id="qtfeijao" min="0">
            </div>
             <div class="fgrid">
                <label for=" "> Óleo(5kg) - 12pts</label>
                <input type="number" id="qtoleo" min="0">
            </div>
             <div class="fgrid">
                <label for=" "> Macarrão(5kg) - 5pts</label>
                <input type="number" id="qtmacarrao" min="0">
            </div>
            <button onclick="calcular()"> Calcular Total da Equipe</button>
            <div id="resultado" class="resultadobx">
                Pontuação Total: 
            </div>
        </section>
    </main>
    <footer>
        <p> Cordenação Trote Solidário 2026: trotessolidario@facef.br</p> 
        <p>Uni-FACEF - Centro Universitário de Franca</p>
    </footer>
    <script><!--programar java-->/*JS é linguagem ñ tipada*/
    function calcular(){
       let qtarroz = Number(document.getElementById("qtarroz").value)
       let qtfeijao = Number(document.getElementById("qtfeijao").value)
       let qtoleo = Number(document.getElementById("qtoleo").value)
       let qtmacarrao = Number(document.getElementById("qtmacarrao").value)
       let pts = (qtarroz * 10) + (qtfeijao * 8) + (qtoleo * 12) + (qtmacarrao * 5)
       document.getElementById("resultado").InnerText = "Pontuação Total: " + pts + "pts"
    }
    </script>
</body>
